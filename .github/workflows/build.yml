name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.6
  APP_REPO_OWNER: AvianJay
  APP_REPO_NAME: yetanotherbusapp
  APP_WORKFLOW_API_ID: build.yml
  APP_WORKFLOW_NIGHTLY_ID: build
  APP_NIGHTLY_ARTIFACT: android-apk-release
  APP_UPDATE_CHANNEL: nightly

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_ALIAS" && -n "$KEYSTORE_PASSWORD" ]]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            printf '%s\n' \
              "storePassword=$KEYSTORE_PASSWORD" \
              "keyPassword=$KEYSTORE_PASSWORD" \
              "keyAlias=$KEYSTORE_ALIAS" \
              "storeFile=upload-keystore.jks" \
              > android/key.properties
          else
            echo "Signing secrets are missing; skip generating release keystore files."
          fi

      - name: Print signing mode
        shell: bash
        run: |
          if [[ -f android/key.properties ]]; then
            echo "Using configured release keystore."
          else
            echo "No signing secrets available; falling back to debug signing."
          fi

      - name: Build APK
        run: >
          flutter build apk --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=${{ env.APP_NIGHTLY_ARTIFACT }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: >
          flutter build web --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=${{ env.APP_NIGHTLY_ARTIFACT }}

      - name: Upload Web artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-release
          path: build/web

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: >
          flutter build windows --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=${{ env.APP_NIGHTLY_ARTIFACT }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: build/windows/x64/runner/Release

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: >
          flutter build linux --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=${{ env.APP_NIGHTLY_ARTIFACT }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: >
          flutter build macos --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=${{ env.APP_NIGHTLY_ARTIFACT }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/YetAnotherBusApp.app

  build-ios-ipa:
    name: Build iOS unsigned IPA
    runs-on: macos-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS build
        run: flutter precache --ios

      - name: Generate iOS archive without codesign
        run: >
          flutter build ios --release --no-codesign
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=${{ env.APP_NIGHTLY_ARTIFACT }}

      - name: Archive Runner.app
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/ipa/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/temp/Payload
          mv build/ipa/*.xcarchive/Products/Applications/*.app build/ipa/temp/Payload/
          rm -rf build/ipa/*.xcarchive
          cd build/ipa/temp
          zip -r Generated_IPA.zip Payload
          mv Generated_IPA.zip ../Generated_IPA.ipa
          cd ../../..
          rm -rf build/ipa/temp

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-unsigned-ipa
          path: build/ipa/Generated_IPA.ipa
